name: Database Secret Test

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  database-connect:
    runs-on: ubuntu-latest
    
    # This creates a real database for the duration of the job
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD }}
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Test Secret Connection
        env:
          DB_PASS: ${{ secrets.DB_PASSWORD }}
        run: |
          echo "Connecting to the local service container..."
          # We use 127.0.0.1 because the DB is running inside the runner
          mysql -h 127.0.0.1 -u root -p"$DB_PASS" -e "SELECT 'Secret Injection Successful' AS Status;"
